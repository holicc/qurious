[package]
name = "qurious"
version = "0.1.0"
edition = "2021"


[dependencies]
arrow = "51.0.0"
sqlparser = { git = "https://github.com/holicc/sqlparser.git" }
url = "2.5.0"
adbc_core = { git = "https://github.com/alexandreyc/adbc-rs", branch = "main", features = [
    "driver_manager",
] }
parquet = "51.0.0"

[dev-dependencies]
arrow = { version = "51.0.0", features = ["prettyprint", "test_utils"] }
