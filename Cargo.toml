[package]
name = "qurious"
version = "0.1.0"
edition = "2021"


[patch.crates-io]
connectorx = { git = "https://github.com/holicc/connector-x.git" }


[dependencies]
arrow = "50.0.0"
connectorx = { version = "0.3.3-alpha.1", default-features = false, features = [
    "branch",
    "dst_arrow",
] }
sqlparser = { git = "https://github.com/holicc/sqlparser.git" }

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html


[dev-dependencies]
arrow = { version = "50.0.0", features = ["prettyprint", "test_utils"] }

[features]
postgres = ["connectorx/src_postgres"]
